<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="d5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect width="300" height="300" rx="60" fill="url(#bg)"/>

  <!-- Grid lines (data/page structure) -->
  <g stroke="#ffffff08" stroke-width="1" fill="none">
    <line x1="0" y1="60" x2="300" y2="60"/>
    <line x1="0" y1="120" x2="300" y2="120"/>
    <line x1="0" y1="180" x2="300" y2="180"/>
    <line x1="0" y1="240" x2="300" y2="240"/>
    <line x1="60" y1="0" x2="60" y2="300"/>
    <line x1="120" y1="0" x2="120" y2="300"/>
    <line x1="180" y1="0" x2="180" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
  </g>

  <!-- Accent circle -->
  <circle cx="150" cy="150" r="80" fill="url(#accent)" opacity="0.15"/>

  <!-- Sparkle/star (AI generation cue) -->
  <g fill="url(#accent)" opacity="0.8">
    <path d="M220 55 l3-9 3 9 9 3-9 3-3 9-3-9-9-3z"/>
    <path d="M240 95 l2-6 2 6 6 2-6 2-2 6-2-6-6-2z"/>
    <path d="M200 85 l1.5-4.5 1.5 4.5 4.5 1.5-4.5 1.5-1.5 4.5-1.5-4.5-4.5-1.5z"/>
  </g>

  <!-- D5 Mark -->
  <g transform="translate(150, 150) scale(1) translate(-80, -55)">
    <!-- D -->
    <g fill="none" stroke="url(#d5)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 10 L20 100 L60 100 Q90 100 90 70 L90 40 Q90 10 60 10 Z"/>
      <!-- Swoosh in D -->
      <path d="M35 40 Q50 30 65 40" stroke-width="4" opacity="0.4"/>
    </g>
    <!-- 5 -->
    <g fill="none" stroke="url(#d5)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
      <path d="M120 10 L90 10 L90 45 L120 45 Q140 45 140 65 L140 85 Q140 105 120 105 L90 105"/>
      <!-- Line under 5 -->
      <path d="M90 57 L120 57" stroke-width="4" opacity="0.4"/>
    </g>
  </g>

  <!-- Bottom tag line -->
  <text x="150" y="260" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
    font-size="12" fill="#6366f180" letter-spacing="3" font-weight="600">iConnectIT</text>
</svg>
