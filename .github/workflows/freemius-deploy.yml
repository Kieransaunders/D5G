name: Deploy to Freemius

# Manual only — this uploads a paid product to Freemius. Not wired to push/main
# so a routine merge can never trigger it by accident.
#
# Auth: product-scoped API bearer token from
# dashboard.freemius.com → product → Settings → API Token,
# saved as the FREEMIUS_API_TOKEN repo secret.
on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: "Freemius release mode (pending = uploaded but invisible to customers)"
        required: true
        default: "pending"
        type: choice
        options:
          - pending
          - beta
          - released

env:
  PRODUCT_ID: "33991"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Freemius SDK
        # vendor/ is gitignored; Freemius rejects zips without its SDK inside
        run: composer install --no-dev --no-interaction --working-dir=plugin/divi5-generator

      - name: Build plugin zip
        # must be absolute: build-zip.sh cd's into a temp dir before zipping,
        # so a relative output path lands in the temp dir and gets cleaned up
        run: bash plugin/build-zip.sh "$PWD"

      - name: Upload to Freemius
        env:
          TOKEN: ${{ secrets.FREEMIUS_API_TOKEN }}
          RELEASE_MODE: ${{ inputs.release_mode }}
        run: |
          resp=$(curl -sS -X POST "https://api.freemius.com/v1/products/$PRODUCT_ID/tags.json" \
            -H "Authorization: Bearer $TOKEN" \
            -F "file=@divi5-generator.zip")
          echo "$resp" | jq .
          tag_id=$(echo "$resp" | jq -r '.id // empty')
          if [ -z "$tag_id" ]; then
            echo "::error::Freemius upload failed: $(echo "$resp" | jq -r '.error.message // "unknown error"')"
            exit 1
          fi
          echo "Uploaded version $(echo "$resp" | jq -r '.version') as tag $tag_id (release_mode: pending)"

          if [ "$RELEASE_MODE" != "pending" ]; then
            curl -sS --fail-with-body -X PUT "https://api.freemius.com/v1/products/$PRODUCT_ID/tags/$tag_id.json" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"release_mode\":\"$RELEASE_MODE\"}" | jq .
            echo "Set release_mode: $RELEASE_MODE"
          fi
