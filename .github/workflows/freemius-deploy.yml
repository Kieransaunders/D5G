name: Deploy to Freemius

# Manual only — this uploads a paid product to Freemius. Not wired to push/main
# so a routine merge can never trigger it by accident.
on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: "Freemius release mode"
        required: true
        default: "pending"
        type: choice
        options:
          - pending
          - beta
          - released
      sandbox:
        description: "Upload in Freemius sandbox mode (test, doesn't go live)"
        required: true
        default: true
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read plugin version
        id: version
        run: |
          v=$(grep -oP "define\( 'D5G_VERSION', '\K[^']+" plugin/divi5-generator/divi5-generator.php)
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        run: bash plugin/build-zip.sh .

      - name: Deploy to Freemius
        # v0.1.2 built the API path from the slug (400 Invalid request path); v0.1.3 uses the numeric id
        uses: buttonizer/freemius-deploy@v0.1.3
        with:
          file_name: divi5-generator.zip
          release_mode: ${{ inputs.release_mode }}
          version: ${{ steps.version.outputs.version }}
          sandbox: ${{ inputs.sandbox }}
        env:
          PUBLIC_KEY: ${{ secrets.FREEMIUS_PUBLIC_KEY }}
          DEV_ID: ${{ secrets.FREEMIUS_DEV_ID }}
          SECRET_KEY: ${{ secrets.FREEMIUS_SECRET_KEY }}
          # slug/id are public identifiers, not credentials — hardcoded so only
          # the three real secrets need configuring
          PLUGIN_SLUG: divi5-generator
          PLUGIN_ID: "33991"
