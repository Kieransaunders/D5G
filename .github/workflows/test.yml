name: test

# Runs every test that doesn't need a live WordPress server or the Claude CLI.
# These are the same suites that catch app↔plugin contract drift, so this is
# the gate that prevents another silent DTI→D5G-style break.
#
# Known environmental reds (NOT run here — they need a live WP site + DTI_KEY
# or a real `claude` binary; documented in openspec/project.md):
#   - skills/divi5-page-generator/scripts/__tests__/e2e-render.test.js
#   - skills/divi5-page-generator/scripts/__tests__/resume-session.test.js
# A per-file timeout keeps any other spawn-happy test from hanging the job.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  app:
    name: app (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci || npm install
      # Per-file timeout: spawn-based integration tests (server, chat-e2e)
      # fail fast instead of hanging the runner if the Claude SDK isn't present.
      - run: node --test --test-reporter=spec --test-timeout=15000 tests/*.test.js

  # plugin (PHP) job moved out — WP plugin now lives in its own private
  # repo (github.com/Kieransaunders/divi5-generator), split 16/07/2026 so its
  # Pro-gating source (RestApi.php, PageCompiler.php, DB export/import) isn't
  # sitting in this public toolkit repo. Its test.yml lives there now.

  skills:
    name: generator skill (pure-node tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Only the pure-node skill tests — no network, no `claude` binary.
      - run: node skills/divi5-page-generator/scripts/__tests__/importer-docs.test.js
