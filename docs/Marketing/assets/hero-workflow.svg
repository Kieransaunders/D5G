<svg viewBox="0 0 2400 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="2400" height="1200" fill="#fafafa"/>

  <!-- Define gradients and styles -->
  <defs>
    <style>
      .stage-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 24px; font-weight: 600; fill: #1e293b; }
      .stage-desc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 16px; fill: #64748b; }
      .arrow-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 14px; fill: #64748b; }
    </style>
  </defs>

  <!-- Stage boxes and arrows -->

  <!-- Stage 1: Brief -->
  <g>
    <rect x="120" y="400" width="360" height="400" rx="16" fill="#f0f4ff" stroke="#6366f1" stroke-width="2"/>
    <!-- Icon: Chat bubble -->
    <circle cx="300" cy="520" r="50" fill="#6366f1"/>
    <path d="M 285 530 Q 290 540 300 540 Q 310 540 315 530" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="295" cy="535" r="4" fill="#ffffff"/>
    <circle cx="305" cy="535" r="4" fill="#ffffff"/>
    <!-- Label -->
    <text x="300" y="650" text-anchor="middle" class="stage-label">Brief</text>
    <text x="300" y="710" text-anchor="middle" class="stage-desc">Describe the page</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M 520 600 L 660 600" stroke="#6366f1" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6366f1" />
    </marker>
  </defs>

  <!-- Stage 2: Generate -->
  <g>
    <rect x="660" y="400" width="360" height="400" rx="16" fill="#f0f4ff" stroke="#6366f1" stroke-width="2"/>
    <!-- Icon: Sparkles -->
    <g transform="translate(840, 520)">
      <polygon points="0,-40 10,-10 40,-5 15,15 20,45 0,25 -20,45 -15,15 -40,-5 -10,-10" fill="#6366f1"/>
    </g>
    <!-- Label -->
    <text x="840" y="650" text-anchor="middle" class="stage-label">Generate</text>
    <text x="840" y="710" text-anchor="middle" class="stage-desc">AI builds page.json</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M 1080 600 L 1220 600" stroke="#6366f1" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Stage 3: Validate (Amber) -->
  <g>
    <rect x="1220" y="400" width="360" height="400" rx="16" fill="#fff8e1" stroke="#f59e0b" stroke-width="2"/>
    <!-- Icon: Shield with checkmark -->
    <g transform="translate(1400, 520)">
      <path d="M 0 -35 L -25 -15 L -25 10 Q 0 35 25 10 L 25 -15 Z" fill="none" stroke="#f59e0b" stroke-width="3"/>
      <path d="M -8 5 L 5 18 L 20 -5" stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Badge -->
    <circle cx="1420" cy="610" r="35" fill="#f59e0b"/>
    <text x="1420" y="625" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">QA</text>
    <!-- Label -->
    <text x="1400" y="680" text-anchor="middle" class="stage-label">Validate</text>
    <text x="1400" y="740" text-anchor="middle" class="stage-desc">QA Gates (2)</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M 1640 600 L 1780 600" stroke="#6366f1" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Stage 4: Import -->
  <g>
    <rect x="1780" y="400" width="360" height="400" rx="16" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <!-- Icon: Plug -->
    <g transform="translate(1960, 520)">
      <rect x="-8" y="-25" width="16" height="30" fill="#64748b"/>
      <circle cx="-12" cy="-15" r="3" fill="#64748b"/>
      <circle cx="12" cy="-15" r="3" fill="#64748b"/>
      <path d="M -15 5 L -25 15 M 15 5 L 25 15 M -5 5 L -5 25 M 5 5 L 5 25" stroke="#64748b" stroke-width="3" fill="none"/>
    </g>
    <!-- Label -->
    <text x="1960" y="660" text-anchor="middle" class="stage-label">Import</text>
    <text x="1960" y="720" text-anchor="middle" class="stage-desc">→ WordPress</text>
  </g>

  <!-- Arrow 4 -->
  <path d="M 2200 600 L 2280 600" stroke="#6366f1" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Stage 5: Live (Green) -->
  <g>
    <rect x="2280" y="400" width="120" height="400" rx="16" fill="#10b981" stroke="#10b981" stroke-width="2"/>
    <!-- Icon: Browser -->
    <g transform="translate(2340, 520)">
      <rect x="-25" y="-20" width="50" height="40" fill="none" stroke="#ffffff" stroke-width="2"/>
      <line x1="-25" y1="-10" x2="25" y2="-10" stroke="#ffffff" stroke-width="2"/>
      <circle cx="-15" cy="-15" r="2" fill="#ffffff"/>
      <circle cx="-8" cy="-15" r="2" fill="#ffffff"/>
    </g>
    <!-- Checkmark -->
    <path d="M 2310 650 L 2330 670 L 2360 640" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Label -->
    <text x="2340" y="730" text-anchor="middle" font-size="20" font-weight="600" fill="#ffffff">Live</text>
  </g>

  <!-- Title -->
  <text x="1200" y="100" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="700" fill="#1e293b">From Brief to Live Page</text>
  <text x="1200" y="160" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#64748b">AI-powered generation with built-in quality gates</text>
</svg>