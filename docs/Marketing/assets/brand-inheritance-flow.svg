<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1400" height="900" fill="#fafafa"/>

  <!-- Styles -->
  <defs>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 20px; font-weight: 700; fill: #1e293b; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 13px; fill: #64748b; }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 14px; fill: #64748b; font-weight: 600; }
      .check { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 18px; fill: #10b981; }
    </style>
  </defs>

  <!-- Left: Source Design -->
  <g>
    <!-- Box -->
    <rect x="40" y="150" width="260" height="600" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>

    <!-- Title -->
    <text x="170" y="195" text-anchor="middle" class="title">Existing Divi</text>
    <text x="170" y="220" text-anchor="middle" class="subtitle">Export</text>

    <!-- Icon: Document -->
    <g transform="translate(170, 290)">
      <rect x="-25" y="-35" width="50" height="70" rx="2" fill="none" stroke="#64748b" stroke-width="2"/>
      <line x1="-20" y1="-20" x2="20" y2="-20" stroke="#64748b" stroke-width="1.5"/>
      <line x1="-20" y1="-8" x2="20" y2="-8" stroke="#64748b" stroke-width="1.5"/>
      <line x1="-20" y1="4" x2="15" y2="4" stroke="#64748b" stroke-width="1.5"/>
      <line x1="-20" y1="16" x2="20" y2="16" stroke="#64748b" stroke-width="1.5"/>
    </g>

    <!-- Page mockup -->
    <g transform="translate(170, 430)">
      <!-- Hero section -->
      <rect x="-40" y="-30" width="80" height="25" fill="#10b981" rx="2"/>
      <!-- Content section -->
      <rect x="-40" y="0" width="80" height="20" fill="#f0f4ff" stroke="#6366f1" stroke-width="1"/>
      <!-- CTA button -->
      <rect x="-20" y="30" width="40" height="12" fill="#6366f1" rx="2"/>
    </g>

    <!-- Text -->
    <text x="170" y="520" text-anchor="middle" class="label">Design System</text>
    <text x="170" y="540" text-anchor="middle" class="label">Palette, Fonts,</text>
    <text x="170" y="560" text-anchor="middle" class="label">Presets</text>
  </g>

  <!-- Center: Extraction -->
  <g>
    <!-- Arrow from left -->
    <path d="M 320 450 L 420 450" stroke="#6366f1" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="#6366f1" />
      </marker>
    </defs>

    <!-- Center box -->
    <rect x="420" y="240" width="340" height="420" rx="12" fill="#f0f4ff" stroke="#6366f1" stroke-width="2"/>

    <!-- Title -->
    <text x="590" y="285" text-anchor="middle" class="title">Extract Design</text>
    <text x="590" y="310" text-anchor="middle" class="title">System</text>

    <!-- Icon: Sparkles -->
    <g transform="translate(590, 360)">
      <polygon points="0,-25 6,-8 25,-5 10,8 13,28 0,15 -13,28 -10,8 -25,-5 -6,-8" fill="#6366f1"/>
    </g>

    <!-- Palette lane -->
    <text x="470" y="440" class="label">Palette</text>
    <g transform="translate(470, 460)">
      <rect x="0" y="0" width="20" height="20" fill="#6366f1" rx="2"/>
      <rect x="25" y="0" width="20" height="20" fill="#10b981" rx="2"/>
      <rect x="50" y="0" width="20" height="20" fill="#f59e0b" rx="2"/>
      <rect x="75" y="0" width="20" height="20" fill="#64748b" rx="2"/>
    </g>

    <!-- Fonts lane -->
    <text x="470" y="530" class="label">Fonts</text>
    <text x="470" y="555" font-size="12" fill="#1e293b">Heading: Space Grotesk</text>
    <text x="470" y="575" font-size="12" fill="#1e293b">Body: Inter</text>

    <!-- Presets lane -->
    <text x="470" y="625" class="label">Presets</text>
    <g transform="translate(470, 645)">
      <rect x="0" y="0" width="50" height="15" fill="#f0f4ff" stroke="#6366f1" stroke-width="1" rx="2"/>
      <rect x="55" y="0" width="35" height="15" fill="#6366f1" rx="2"/>
      <rect x="95" y="0" width="45" height="15" fill="#f0f4ff" stroke="#6366f1" stroke-width="1" rx="2"/>
    </g>

    <!-- Registry -->
    <rect x="450" y="700" width="280" height="60" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
    <text x="590" y="725" text-anchor="middle" class="label">Brand System Registry</text>
    <text x="590" y="750" text-anchor="middle" font-size="12" fill="#6366f1">📁 Shared Colors, Fonts, Presets</text>
  </g>

  <!-- Right: New Pages -->
  <g>
    <!-- Arrow from center -->
    <path d="M 800 450 L "900" 450" stroke="#6366f1" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

    <!-- Page 1 -->
    <g>
      <rect x="920" y="140" width="200" height="140" rx="12" fill="#f0f4ff" stroke="#6366f1" stroke-width="1.5"/>
      <text x="1020" y="165" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Page 1</text>
      <text x="1080" y="165" text-anchor="middle" class="check">✓</text>

      <!-- Mini page mockup -->
      <g transform="translate(1020, 210)">
        <rect x="-30" y="-15" width="60" height="15" fill="#10b981" rx="2"/>
        <rect x="-30" y="5" width="60" height="12" fill="#f0f4ff" stroke="#6366f1" stroke-width="0.5"/>
        <rect x="-15" y="25" width="30" height="8" fill="#6366f1" rx="2"/>
      </g>
    </g>

    <!-- Page 2 -->
    <g>
      <rect x="920" y="340" width="200" height="140" rx="12" fill="#f0f4ff" stroke="#6366f1" stroke-width="1.5"/>
      <text x="1020" y="365" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Page 2</text>
      <text x="1080" y="365" text-anchor="middle" class="check">✓</text>

      <!-- Mini page mockup -->
      <g transform="translate(1020, 410)">
        <rect x="-30" y="-15" width="60" height="15" fill="#10b981" rx="2"/>
        <rect x="-30" y="5" width="60" height="12" fill="#f0f4ff" stroke="#6366f1" stroke-width="0.5"/>
        <rect x="-15" y="25" width="30" height="8" fill="#6366f1" rx="2"/>
      </g>
    </g>

    <!-- Page N -->
    <g>
      <rect x="920" y="540" width="200" height="140" rx="12" fill="#f0f4ff" stroke="#6366f1" stroke-width="1.5"/>
      <text x="1020" y="565" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Page N</text>
      <text x="1080" y="565" text-anchor="middle" class="check">✓</text>

      <!-- Mini page mockup -->
      <g transform="translate(1020, 610)">
        <rect x="-30" y="-15" width="60" height="15" fill="#10b981" rx="2"/>
        <rect x="-30" y="5" width="60" height="12" fill="#f0f4ff" stroke="#6366f1" stroke-width="0.5"/>
        <rect x="-15" y="25" width="30" height="8" fill="#6366f1" rx="2"/>
      </g>
    </g>

    <!-- Title -->
    <text x="1020" y="750" text-anchor="middle" class="title">Auto-inherit</text>
    <text x="1020" y="775" text-anchor="middle" class="subtitle">Same palette, fonts, presets</text>
  </g>

  <!-- Main title -->
  <text x="700" y="50" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="700" fill="#1e293b">Brand Inheritance</text>
  <text x="700" y="90" text-anchor="middle" font-size="16" fill="#64748b">Extract once → Pages automatically inherit brand system</text>
</svg>