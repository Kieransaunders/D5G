<svg viewBox="0 0 1400 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1400" height="700" fill="#fafafa"/>

  <!-- Styles -->
  <defs>
    <style>
      .side-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 24px; font-weight: 700; }
      .phase-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 14px; font-weight: 600; }
      .duration { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 13px; }
      .total-time { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 48px; font-weight: 700; }
      .total-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 16px; }
    </style>
  </defs>

  <!-- LEFT SIDE: MANUAL (5 DAYS) -->
  <g>
    <!-- Background box -->
    <rect x="20" y="40" width="620" height="600" rx="16" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>

    <!-- Title -->
    <text x="330" y="85" text-anchor="middle" class="side-title" fill="#1e293b">Manual Page Build</text>

    <!-- Design phase -->
    <g>
      <rect x="80" y="140" width="520" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <!-- Icon -->
      <g transform="translate(120, 175)">
        <circle cx="0" cy="0" r="12" fill="none" stroke="#64748b" stroke-width="2"/>
        <path d="M -8 -5 L -2 2 L 6 -6" stroke="#64748b" stroke-width="2" fill="none" stroke-linecap="round"/>
      </g>
      <!-- Labels -->
      <text x="160" y="165" class="phase-label" fill="#1e293b">Design</text>
      <text x="160" y="190" class="duration" fill="#64748b">Concept, mockups, design review</text>
      <!-- Duration bar -->
      <rect x="400" y="155" width="160" height="16" rx="4" fill="#ef4444" opacity="0.2"/>
      <text x="480" y="180" text-anchor="middle" class="duration" fill="#1e293b">2 days</text>
    </g>

    <!-- Development phase -->
    <g>
      <rect x="80" y="250" width="520" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <!-- Icon -->
      <g transform="translate(120, 285)">
        <path d="M -10 -10 L 0 5 L 10 -10 M -5 2 L 5 2" stroke="#64748b" stroke-width="2" fill="none" stroke-linecap="round"/>
      </g>
      <!-- Labels -->
      <text x="160" y="275" class="phase-label" fill="#1e293b">Development</text>
      <text x="160" y="300" class="duration" fill="#64748b">Build layout, sections, styling</text>
      <!-- Duration bar -->
      <rect x="400" y="265" width="160" height="16" rx="4" fill="#ef4444" opacity="0.2"/>
      <text x="480" y="290" text-anchor="middle" class="duration" fill="#1e293b">2 days</text>
    </g>

    <!-- QA phase -->
    <g>
      <rect x="80" y="360" width="520" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <!-- Icon -->
      <g transform="translate(120, 395)">
        <rect x="-10" y="-8" width="20" height="16" fill="none" stroke="#64748b" stroke-width="2"/>
        <path d="M -6 0 L 0 6 L 6 -3" stroke="#64748b" stroke-width="2" fill="none" stroke-linecap="round"/>
      </g>
      <!-- Labels -->
      <text x="160" y="385" class="phase-label" fill="#1e293b">QA & Testing</text>
      <text x="160" y="410" class="duration" fill="#64748b">Testing, bug fixes, refinements</text>
      <!-- Duration bar -->
      <rect x="400" y="375" width="80" height="16" rx="4" fill="#ef4444" opacity="0.2"/>
      <text x="480" y="400" text-anchor="middle" class="duration" fill="#1e293b">1 day</text>
    </g>

    <!-- Total time -->
    <g>
      <rect x="80" y="500" width="520" height="110" rx="8" fill="#fff0f0" stroke="#ef4444" stroke-width="2"/>
      <text x="340" y="535" text-anchor="middle" class="total-time" fill="#ef4444">5 DAYS</text>
      <text x="340" y="570" text-anchor="middle" class="total-label" fill="#b91c1c">5 business days</text>
      <text x="340" y="595" text-anchor="middle" class="total-label" fill="#b91c1c">~40 billable hours</text>
    </g>
  </g>

  <!-- CENTER: IMPACT ARROW -->
  <g>
    <!-- Arrow -->
    <path d="M 680 350 L 720 350" stroke="#10b981" stroke-width="4" fill="none" marker-end="url(#arrowhead-green)"/>
    <defs>
      <marker id="arrowhead-green" markerWidth="15" markerHeight="15" refX="12" refY="7.5" orient="auto">
        <polygon points="0 0, 15 7.5, 0 15" fill="#10b981" />
      </marker>
    </defs>

    <!-- Impact text -->
    <text x="700" y="310" text-anchor="middle" font-size="28" font-weight="700" fill="#10b981">98%</text>
    <text x="700" y="340" text-anchor="middle" font-size="16" fill="#10b981" font-weight="600">FASTER</text>
  </g>

  <!-- RIGHT SIDE: DIVI5GENERATE (~1 HOUR) -->
  <g>
    <!-- Background box -->
    <rect x="760" y="40" width="620" height="600" rx="16" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="1"/>

    <!-- Title -->
    <text x="1070" y="85" text-anchor="middle" class="side-title" fill="#6366f1">Divi5Generate</text>

    <!-- Chat phase -->
    <g>
      <rect x="820" y="140" width="500" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <!-- Icon -->
      <g transform="translate(860, 175)">
        <rect x="-10" y="-8" width="20" height="16" fill="none" stroke="#6366f1" stroke-width="2" rx="2"/>
        <circle cx="-4" cy="-2" r="1.5" fill="#6366f1"/>
        <circle cx="4" cy="-2" r="1.5" fill="#6366f1"/>
        <line x1="-6" y1="4" x2="6" y2="4" stroke="#6366f1" stroke-width="1.5"/>
      </g>
      <!-- Labels -->
      <text x="900" y="165" class="phase-label" fill="#1e293b">Chat & Brief</text>
      <text x="900" y="190" class="duration" fill="#64748b">Describe your page in chat</text>
      <!-- Duration bar -->
      <rect x="1050" y="155" width="40" height="16" rx="4" fill="#10b981" opacity="0.2"/>
      <text x="1090" y="180" text-anchor="middle" class="duration" fill="#1e293b">5 min</text>
    </g>

    <!-- Generation phase -->
    <g>
      <rect x="820" y="250" width="500" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <!-- Icon -->
      <g transform="translate(860, 285)">
        <polygon points="0,-10 4,-2 11,-4 5,3 7,11 0,7 -7,11 -5,3 -11,-4 -4,-2" fill="#6366f1"/>
      </g>
      <!-- Labels -->
      <text x="900" y="275" class="phase-label" fill="#1e293b">AI Generation</text>
      <text x="900" y="300" class="duration" fill="#64748b">AI builds and validates page</text>
      <!-- Duration bar -->
      <rect x="1050" y="265" width="120" height="16" rx="4" fill="#10b981" opacity="0.2"/>
      <text x="1110" y="290" text-anchor="middle" class="duration" fill="#1e293b">30 min</text>
    </g>

    <!-- Import phase -->
    <g>
      <rect x="820" y="360" width="500" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <!-- Icon -->
      <g transform="translate(860, 395)">
        <path d="M -8 5 L 0 -5 L 8 5 M -8 5 L -8 10 L 8 10" stroke="#6366f1" stroke-width="2" fill="none" stroke-linecap="round"/>
      </g>
      <!-- Labels -->
      <text x="900" y="385" class="phase-label" fill="#1e293b">Import & Review</text>
      <text x="900" y="410" class="duration" fill="#64748b">One-click import to WordPress</text>
      <!-- Duration bar -->
      <rect x="1050" y="375" width="60" height="16" rx="4" fill="#10b981" opacity="0.2"/>
      <text x="1090" y="400" text-anchor="middle" class="duration" fill="#1e293b">15 min</text>
    </g>

    <!-- Total time -->
    <g>
      <rect x="820" y="500" width="500" height="110" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
      <text x="1070" y="535" text-anchor="middle" class="total-time" fill="#10b981">~1 HOUR</text>
      <text x="1070" y="570" text-anchor="middle" class="total-label" fill="#166534">~50 minutes</text>
      <text x="1070" y="595" text-anchor="middle" class="total-label" fill="#166534">~2 billable hours</text>
    </g>
  </g>

  <!-- Main title -->
  <text x="700" y="35" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="700" fill="#1e293b">Speed: Days to Minutes</text>
</svg>