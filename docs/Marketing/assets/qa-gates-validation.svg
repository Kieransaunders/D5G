<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#fafafa"/>

  <!-- Styles -->
  <defs>
    <style>
      .gate-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 22px; font-weight: 700; fill: #6366f1; }
      .gate-desc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 14px; fill: #64748b; }
      .check-item { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 14px; fill: #1e293b; }
      .badge-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 16px; font-weight: 700; fill: #ffffff; }
      .delivery-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 24px; font-weight: 700; fill: #ffffff; }
      .file-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; font-size: 13px; fill: #1e293b; }
    </style>
  </defs>

  <!-- Gate 1: Style Check -->
  <g>
    <!-- Box -->
    <rect x="150" y="80" width="900" height="180" rx="12" fill="#f0f4ff" stroke="#6366f1" stroke-width="2"/>

    <!-- Icon: Shield -->
    <g transform="translate(250, 145)">
      <path d="M 0 -25 L -18 -12 L -18 8 Q 0 28 18 8 L 18 -12 Z" fill="none" stroke="#6366f1" stroke-width="2.5"/>
      <path d="M -6 3 L 4 12 L 14 -4" stroke="#6366f1" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Title and description -->
    <text x="330" y="125" class="gate-title">Gate 1: Style Check</text>
    <text x="330" y="150" class="gate-desc">Verifies preset IDs, palette colours, fonts match designer export</text>

    <!-- Checklist -->
    <text x="330" y="185" class="check-item">✓ Preset IDs match designer export</text>
    <text x="330" y="210" class="check-item">✓ Colours on approved palette</text>
    <text x="330" y="235" class="check-item">✓ Fonts inherited correctly</text>

    <!-- Badge: PASS -->
    <rect x="1100" y="105" width="80" height="70" rx="8" fill="#10b981"/>
    <text x="1140" y="140" text-anchor="middle" class="badge-text">PASS</text>
    <text x="1140" y="160" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">✓</text>
  </g>

  <!-- Arrow down -->
  <path d="M 600 260 L 600 310" stroke="#6366f1" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6366f1" />
    </marker>
  </defs>

  <!-- Gate 2: Design Review -->
  <g>
    <!-- Box -->
    <rect x="150" y="310" width="900" height="180" rx="12" fill="#f0f4ff" stroke="#6366f1" stroke-width="2"/>

    <!-- Icon: Clipboard -->
    <g transform="translate(250, 375)">
      <rect x="-10" y="-20" width="20" height="35" fill="none" stroke="#6366f1" stroke-width="2.5"/>
      <rect x="-12" y="-25" width="24" height="6" fill="#6366f1"/>
      <line x1="-6" y1="-8" x2="6" y2="-8" stroke="#6366f1" stroke-width="1.5"/>
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#6366f1" stroke-width="1.5"/>
      <line x1="-6" y1="8" x2="6" y2="8" stroke="#6366f1" stroke-width="1.5"/>
    </g>

    <!-- Title and description -->
    <text x="330" y="355" class="gate-title">Gate 2: Design Review</text>
    <text x="330" y="380" class="gate-desc">Confirms page matches brief specification</text>

    <!-- Checklist -->
    <text x="330" y="415" class="check-item">✓ All required sections present</text>
    <text x="330" y="440" class="check-item">✓ CTAs positioned correctly</text>
    <text x="330" y="465" class="check-item">✓ Copy matches approved brief</text>

    <!-- Badge: PASS -->
    <rect x="1100" y="335" width="80" height="70" rx="8" fill="#10b981"/>
    <text x="1140" y="370" text-anchor="middle" class="badge-text">PASS</text>
    <text x="1140" y="390" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">✓</text>
  </g>

  <!-- Arrow down -->
  <path d="M 600 490 L 600 540" stroke="#6366f1" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Delivery Ready -->
  <g>
    <!-- Box -->
    <rect x="150" y="540" width="900" height="200" rx="12" fill="#10b981"/>

    <!-- Icon: Large checkmark in circle -->
    <g transform="translate(250, 625)">
      <circle cx="0" cy="0" r="28" fill="none" stroke="#ffffff" stroke-width="3"/>
      <path d="M -12 0 L 0 12 L 15 -8" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Title -->
    <text x="330" y="595" class="delivery-title">Delivery Ready ✓</text>
    <text x="330" y="625" font-family="sans-serif" font-size="14" fill="#ffffff" opacity="0.95">Page ready for publication</text>

    <!-- Files -->
    <text x="330" y="660" font-size="14" fill="#ffffff">📄 page.json</text>
    <text x="330" y="690" font-size="14" fill="#ffffff">📄 seo-meta.json</text>
    <text x="330" y="720" font-size="14" fill="#ffffff">📄 schema.json</text>
  </g>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="700" fill="#1e293b">Quality Assurance Gates</text>
</svg>